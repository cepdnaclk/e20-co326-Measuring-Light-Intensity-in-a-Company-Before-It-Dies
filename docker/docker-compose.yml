services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    networks:
      - iot_network

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=root
      - DOCKER_INFLUXDB_INIT_PASSWORD=rootpassword
      - DOCKER_INFLUXDB_INIT_ORG=light_org
      - DOCKER_INFLUXDB_INIT_BUCKET=light_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=root-token
    ports:
      - "8086:8086"
    volumes:
      - influxdb2_data:/var/lib/influxdb2
    networks:
      - iot_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    networks:
      - iot_network

  node-red:
    image: nodered/node-red:latest
    container_name: node-red
    volumes:
      - ./node-red/data:/data
    ports:
      - "1880:1880"
    depends_on:
      - mosquitto
    networks:
      - iot_network

networks:
  iot_network:
    driver: bridge

volumes:
  influxdb2_data: