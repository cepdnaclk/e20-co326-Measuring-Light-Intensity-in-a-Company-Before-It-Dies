services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    networks:
      - iot_network

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=root
      - DOCKER_INFLUXDB_INIT_PASSWORD=rootpassword
      - DOCKER_INFLUXDB_INIT_ORG=light_org
      - DOCKER_INFLUXDB_INIT_BUCKET=light_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=root-token
    ports:
      - "8086:8086"
    volumes:
      - influxdb2_data:/var/lib/influxdb2
    networks:
      - iot_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    networks:
      - iot_network

  simulator-server:
    build:
      context: ../simulator
      dockerfile: server/Dockerfile
    image: simulator-server
    container_name: simulator-server
    ports:
      - "4000:4000"
    environment:
      - MQTT_URL=mqtt://mosquitto:1883
      - MQTT_ENABLED=true
    depends_on:
      - mosquitto
    networks:
      - iot_network

  simulator-client:
    build:
      context: ../simulator
      dockerfile: client/Dockerfile
    image: simulator-client
    container_name: simulator-client
    ports:
      - "5173:80"
    depends_on:
      - simulator-server
    networks:
      - iot_network

  node-red:
    build:
      context: ./node-red
    image: nodered-custom
    container_name: node-red
    volumes:
      - ./node-red/data:/data
    ports:
      - "1880:1880"
    depends_on:
      - mosquitto
    networks:
      - iot_network

  # -----------------------------------------------------------------------
  # Python Edge AI service
  # Runs XGBoost failure prediction, fault classification, anomaly
  # detection, and alert publishing.  Subscribes to sensor data via
  # MQTT, exposes a FastAPI REST API on port 5000.
  # -----------------------------------------------------------------------
  python-edge:
    build:
      context: ../python
      dockerfile: Dockerfile
    image: python-edge
    container_name: python-edge
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=root-token
      - INFLUXDB_ORG=light_org
      - INFLUXDB_BUCKET=light_data
      - MQTT_URL=mqtt://mosquitto:1883
      - MQTT_TOPIC_ALERTS=factory/sitea/floor1/line1/cell1/lum_0001/alerts/status
      - MQTT_TOPIC_PREDICTIONS=factory/{site}/{floor}/{line}/{cell}/{bulb_id}/telemetry/predictions
      - MQTT_TOPIC_DATA=factory/+/+/+/+/+/telemetry/raw
      - MQTT_TOPIC_EDGE=factory/+/+/+/+/+/telemetry/edge-ai
    ports:
      - "5000:5000"
    depends_on:
      - influxdb
      - mosquitto
    networks:
      - iot_network

networks:
  iot_network:
    driver: bridge

volumes:
  influxdb2_data:
